name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

permissions:
    actions: write
    attestations: write
    checks: write
    contents: write
    packages: write
    id-token: write
    security-events: write

jobs:
    ci:
        name: Continuous Integration
        uses: falkcorp/github-common/.github/workflows/reusable-ci.yml@bfb912c850effd1ae9aded26d14856a538d3e5fc # v1.10.7
        with:
            go-version: "1.24"
        secrets: inherit
